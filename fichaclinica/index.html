<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Clínica | OdontoDigital</title>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-clinical { background-color: #f1f5f9; } /* Slate 100 */
        @media print {
            .no-print { display: none !important; }
            .print-card { border: none !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            body { background: white; }
        }
    </style>
</head>
<body class="bg-clinical text-slate-700 min-h-screen">

    <nav class="bg-white border-b border-slate-200 py-4 px-8 no-print sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="flex items-center gap-2 text-slate-400 hover:text-blue-600 transition group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:-translate-x-1 transition-transform" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    <span class="text-sm font-medium">Volver al Portal</span>
                </a>
                <span class="h-6 w-px bg-slate-200"></span>
                <h1 class="text-xl font-bold text-blue-900 tracking-tight">Ficha Clínica Digital</h1>
            </div>
            
            <!-- Banner Unificado -->
            <div class="hidden md:flex items-center gap-3">
                <div class="flex items-center gap-3 bg-slate-50 px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                    <div class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center font-black shadow-inner">
                        <i class="fa-solid fa-user-doctor text-sm"></i>
                    </div>
                    <div class="text-left">
                        <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Profesional</span>
                        <span class="session-operador-display text-xs font-bold text-slate-700 leading-none">Cargando...</span>
                    </div>
                </div>

                <div class="flex items-center gap-3 bg-slate-50 px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                    <div class="text-right">
                        <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Paciente</span>
                        <span class="session-paciente-display text-xs font-bold text-slate-700 leading-none">Cargando...</span>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-black shadow-inner">
                        <i class="fa-solid fa-user text-sm"></i>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="window.print()" class="text-slate-600 bg-white border border-slate-300 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 transition shadow-sm">
                    🖨️ PDF / Imprimir
                </button>
                <button form="patientForm" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md hover:bg-blue-700 transition">
                    Guardar y Sincronizar
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-10">
        <form id="patientForm" class="space-y-8">
            
            <!-- 1. IDENTIFICACIÓN -->
            <section class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm print-card">
                    <div class="flex items-center gap-3 mb-8 border-b border-slate-50 pb-5">
                        <div class="bg-blue-50 p-2 rounded-xl text-blue-600">
                            <i class="fa-solid fa-address-card text-xl"></i>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">Identificación</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Nombre Completo</label>
                            <input type="text" id="nombre" required placeholder="Ej: Juan Pérez Méndez" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition text-slate-800">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">RUT / ID</label>
                            <input type="text" id="rut" required placeholder="12.345.678-9" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition text-slate-800">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Edad</label>
                                <input type="number" id="edad" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Género</label>
                                <select id="genero" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition">
                                    <option value="Masculino">Masculino</option>
                                    <option value="Femenino">Femenino</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Contácto (Tel / Email)</label>
                            <input type="text" id="contacto" placeholder="+56 9..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Previsión (Seguro)</label>
                            <input type="text" id="prevision" placeholder="Ej: Fonasa, Isapre..." class="w-full bg-blue-50/50 border border-blue-100 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Ocupación</label>
                            <input type="text" id="ocupacion" placeholder="Ej: Profesor, Ingeniero, Estudiante..." class="w-full bg-blue-50/50 border border-blue-100 rounded-2xl p-4 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition">
                        </div>
                    </div>
                </section>

                <!-- 2. MOTIVO DE CONSULTA E HISTORIA ODONTOLÓGICA -->
                <section class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm print-card">
                    <div class="flex items-center gap-3 mb-8 border-b border-slate-50 pb-5">
                        <div class="bg-indigo-50 p-2 rounded-xl text-indigo-600">
                            <i class="fa-solid fa-tooth text-xl"></i>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">Historia Odontológica</h2>
                    </div>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Motivo de consulta actual</label>
                            <textarea id="motivo_actual" rows="2" placeholder="¿Por qué acude hoy a la consulta?" class="w-full bg-indigo-50/30 border border-indigo-100 rounded-2xl p-4 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition"></textarea>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Última visita al dentista</label>
                                <input type="text" id="ultima_visita" placeholder="Ej: Hace 6 meses..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Motivo última visita</label>
                                <input type="text" id="motivo_ultima_visita" placeholder="Ej: Limpieza, Dolor..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 3. ANAMNESIS MÉDICA -->
                <section class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm print-card">
                    <div class="flex items-center gap-3 mb-8 border-b border-slate-50 pb-5">
                        <div class="bg-red-50 p-2 rounded-xl text-red-600">
                            <i class="fa-solid fa-notes-medical text-xl"></i>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">Anamnesis Médica</h2>
                    </div>
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Alergias Conocidas</label>
                                <textarea id="alergias" rows="2" placeholder="Penicilina, látex..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-red-500/10 focus:border-red-500 outline-none transition"></textarea>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Enfermedades Sistémicas</label>
                                <textarea id="enfermedades" rows="2" placeholder="Diabetes, Hipertensión..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 focus:ring-4 focus:ring-red-500/10 focus:border-red-500 outline-none transition"></textarea>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Consumo de Fármacos</label>
                                <textarea id="farmacos" rows="2" placeholder="Medicamentos actuales..." class="w-full bg-red-50/30 border border-red-100 rounded-2xl p-4 focus:ring-4 focus:ring-red-500/10 focus:border-red-500 outline-none transition"></textarea>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Antecedentes Familiares</label>
                                <textarea id="antecedentes_familiares" rows="2" placeholder="Enfermedades hereditarias..." class="w-full bg-red-50/30 border border-red-100 rounded-2xl p-4 focus:ring-4 focus:ring-red-500/10 focus:border-red-500 outline-none transition"></textarea>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 4. HÁBITOS Y PSICOSOCIAL -->
                <section class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm print-card">
                    <div class="flex items-center gap-3 mb-8 border-b border-slate-50 pb-5">
                        <div class="bg-teal-50 p-2 rounded-xl text-teal-600">
                            <i class="fa-solid fa-brain text-xl"></i>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">Perfil Psicosocial</h2>
                    </div>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Hábitos</label>
                            <textarea id="habitos" rows="2" placeholder="Tabaco, alcohol, bruxismo..." class="w-full bg-teal-50/30 border border-teal-100 rounded-2xl p-4 focus:ring-4 focus:ring-teal-500/10 focus:border-teal-500 outline-none transition"></textarea>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Evaluación Psicológica</label>
                            <textarea id="evaluacion_psicologica" rows="2" placeholder="Ansiedad dental, disposición..." class="w-full bg-teal-50/30 border border-teal-100 rounded-2xl p-4 focus:ring-4 focus:ring-teal-500/10 focus:border-teal-500 outline-none transition"></textarea>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Expectativas</label>
                            <textarea id="expectativas" rows="2" placeholder="¿Qué espera del tratamiento?" class="w-full bg-teal-50/30 border border-teal-100 rounded-2xl p-4 focus:ring-4 focus:ring-teal-500/10 focus:border-teal-500 outline-none transition"></textarea>
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Riesgo Social</label>
                            <textarea id="riesgo_social" rows="2" placeholder="Condiciones sociales clave..." class="w-full bg-teal-50/30 border border-teal-100 rounded-2xl p-4 focus:ring-4 focus:ring-teal-500/10 focus:border-teal-500 outline-none transition"></textarea>
                        </div>
                    </div>
                </section>
                
        </form>
    </main>

    <footer class="p-6 text-center text-slate-400 text-[10px] uppercase mt-12 border-t border-slate-200 print:hidden">
        Portal Suite Dental | Ficha Clínica Digital - <span class="app-version-display font-bold text-slate-500" data-app="fichaclinica"></span>
    </footer>

    <!-- Cargamos script.js para gestionar el guardado -->
    <script src="../version.js"></script>
    <script src="script.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</body>
</html>
