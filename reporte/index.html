<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Clínico Integral - App Dental</title>
    <!-- Tailwind CSS (Para estructurar rápidamente sin estilos sueltos) -->
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 text-slate-900 font-sans print:bg-white p-8 antialiased">
    
    <div class="max-w-4xl mx-auto bg-white p-12 shadow-2xl rounded-2xl print:shadow-none print:p-0 print:rounded-none" id="report-container">
        
        <!-- HEADER DEL INFORME -->
        <header class="border-b-4 border-slate-900 pb-6 mb-8 flex justify-between items-end">
            <div>
                <img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png" alt="Logo" class="w-12 h-12 mb-4 opacity-80 print:grayscale">
                <h1 class="text-4xl font-black text-slate-900 uppercase tracking-tight">Reporte Clínico</h1>
                <p class="text-slate-500 text-sm mt-1 font-bold tracking-widest uppercase">Odontograma & Periodontograma Digital</p>
            </div>
            <div class="text-right">
                <p class="font-bold text-xl text-slate-800" id="rep-fecha">00/00/0000</p>
                <p class="text-sm text-slate-500 font-medium" id="rep-hora">00:00</p>
            </div>
        </header>

        <!-- SECCIÓN 1: FICHA PACIENTE -->
        <section class="mb-10">
            <h2 class="text-xl font-black bg-slate-100 p-3 mb-4 border-l-4 border-indigo-600 uppercase tracking-wide flex items-center gap-2">
                <i class="fa-solid fa-user-injured text-indigo-400"></i> Antecedentes del Paciente
            </h2>
            <div class="grid grid-cols-2 gap-x-8 gap-y-4 text-sm bg-white border rounded-xl p-6 shadow-sm print:border-none print:shadow-none print:p-0" id="sec-ficha">
                <!-- Data inyectada por JS -->
            </div>
        </section>

        <!-- SECCIÓN 2: ODONTOGRAMA -->
        <section class="mb-10">
            <h2 class="text-xl font-black bg-slate-100 p-3 mb-4 border-l-4 border-rose-500 uppercase tracking-wide flex items-center gap-2">
                <i class="fa-solid fa-tooth text-rose-400"></i> Hallazgos Odontograma
            </h2>
            <div id="sec-odonto" class="text-sm bg-white border rounded-xl p-6 shadow-sm print:border-none print:shadow-none print:p-0">
                 <table class="w-full text-left border-collapse">
                     <thead>
                         <tr class="border-b-2 border-slate-300 text-slate-600 uppercase tracking-wider text-xs">
                             <th class="pb-3 w-24">Pieza</th>
                             <th class="pb-3">Diagnóstico / Patología</th>
                             <th class="pb-3">Caras Afectadas</th>
                         </tr>
                     </thead>
                     <tbody id="tabla-odonto">
                         <!-- Data inyectada por JS -->
                     </tbody>
                 </table>
            </div>
        </section>

        <!-- SECCIÓN 3: PERIODONTOGRAMA -->
        <section class="mb-10">
            <h2 class="text-xl font-black bg-slate-100 p-3 mb-4 border-l-4 border-blue-500 uppercase tracking-wide flex items-center gap-2">
                <i class="fa-solid fa-ruler-combined text-blue-400"></i> Sondaje Periodontal
            </h2>
            <div id="sec-perio" class="text-sm">
                <!-- Sub-tablas generadas por JS -->
            </div>
        </section>

        <!-- FIRMA PROFESIONAL -->
        <section class="mt-20 pt-16 flex justify-end break-inside-avoid">
            <div class="text-center w-72 border-t-2 border-slate-800 pt-3">
                <p class="font-black text-lg text-slate-900" id="firma-dr">Dr/Dra. Profesional Médico</p>
                <p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Firma y Timbre Evaluador</p>
            </div>
        </section>

        <!-- CONTROLES WEB (No visibles en PDF) -->
        <div class="mt-16 flex justify-center gap-4 print:hidden border-t pt-8">
            <button onclick="window.close()" class="px-8 py-3 bg-white border-2 border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-colors">Volver al Portal</button>
            <button onclick="window.print()" class="px-8 py-3 bg-red-600 text-white font-bold rounded-xl shadow-lg hover:bg-red-700 hover:shadow-xl transition-all flex items-center gap-2 active:scale-95">
                <i class="fa-solid fa-file-pdf"></i> Guardar / Imprimir PDF
            </button>
        </div>
        <div class="text-center mt-8 text-[10px] text-slate-400 uppercase tracking-widest font-bold">
            Generado por Dental Suite Pro - <span class="app-version-display" data-app="reporte"></span>
        </div>
    </div>

    <!-- Script Lógico -->
    <script src="../version.js"></script>
    <script src="script.js"></script>
</body>
</html>
