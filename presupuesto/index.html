<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto de Tratamiento - Dental Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="min-h-screen font-sans text-slate-800 flex flex-col items-center bg-slate-50">

    <!-- Navbar Global (Estándar Dental Suite) -->
    <nav class="w-full bg-slate-900 border-b border-slate-800 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 lg:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="flex items-center justify-center w-10 h-10 rounded-xl bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="hidden sm:block h-6 w-px bg-slate-700 mx-2"></div>
                <div class="flex items-center gap-3">
                    <div class="bg-amber-500/20 p-2 rounded-lg border border-amber-500/30 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                        <i class="fa-solid fa-file-invoice-dollar text-amber-400 text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black tracking-tight text-white uppercase flex items-center gap-2">
                            Presupuesto <span class="text-amber-400">Dental</span>
                            <span class="app-version-display bg-slate-800 text-slate-400 text-[9px] px-2 py-0.5 rounded border border-slate-700 tracking-widest uppercase font-bold" data-app="presupuesto"></span>
                        </h1>
                    </div>
                </div>
            </div>

            <!-- Banner Dr/Paciente Global -->
            <div id="banner-sesion-global" class="hidden md:flex items-center gap-4 bg-slate-800/80 px-4 py-2 rounded-xl border border-slate-700/50">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-user-md text-amber-400/70 text-sm"></i>
                    <span id="banner-dr-name" class="text-xs font-bold text-slate-300 uppercase tracking-wider">Dr. No Asignado</span>
                </div>
                <div class="w-px h-4 bg-slate-600"></div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-user text-blue-400/70 text-sm"></i>
                    <span id="banner-patient-name" class="text-xs font-bold text-slate-300 uppercase tracking-wider">Sin Paciente</span>
                </div>
                <div class="w-px h-4 bg-slate-600"></div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-address-card text-teal-400/70 text-sm"></i>
                    <span id="banner-patient-rut" class="text-xs font-bold text-slate-300 uppercase tracking-wider">---</span>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Aviso Mobile para Banner -->
    <div id="banner-sesion-mobile" class="md:hidden w-full bg-slate-800 border-b border-slate-700 px-4 py-2 flex justify-between items-center hidden">
        <span id="banner-dr-mobile" class="text-[10px] font-bold text-slate-300 uppercase">Dr. --</span>
        <span id="banner-patient-mobile" class="text-[10px] font-bold text-amber-400 uppercase">--</span>
    </div>

    <main class="container mx-auto px-4 py-8 w-full max-w-5xl flex-grow">
        <div class="bg-white rounded-[2rem] p-6 sm:p-8 shadow-xl shadow-amber-900/5 border border-slate-100 mb-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-amber-400 to-orange-500"></div>
            
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Plan de Tratamiento</h2>
                    <p class="text-sm text-slate-500 mt-1">Sugerido según los hallazgos en el Odontograma</p>
                </div>
                <button id="btn-agregar-manual" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-bold py-2 px-4 rounded-xl transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">Añadir Ítem Manual</span>
                </button>
            </div>

            <!-- Tabla de Presupuesto -->
            <div class="overflow-x-auto rounded-2xl border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                            <th class="p-4 font-bold rounded-tl-2xl">Diente</th>
                            <th class="p-4 font-bold">Hallazgo Clínico</th>
                            <th class="p-4 font-bold">Tratamiento Sugerido</th>
                            <th class="p-4 font-bold w-40">Valor ($)</th>
                            <th class="p-4 font-bold w-12 text-center rounded-tr-2xl"></th>
                        </tr>
                    </thead>
                    <tbody id="lista-tratamientos" class="divide-y divide-slate-100">
                        <!-- Generado por JS -->
                    </tbody>
                    <tfoot class="bg-slate-50 border-t-2 border-slate-200">
                        <tr>
                            <td colspan="3" class="p-4 text-right font-bold text-slate-700 uppercase tracking-widest text-sm">
                                Total Estimado:
                            </td>
                            <td class="p-4">
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">$</span>
                                    <input type="text" id="total-presupuesto" readonly value="0"
                                        class="w-full pl-7 pr-3 py-2 bg-white rounded-lg border-2 border-amber-400 text-lg font-black text-amber-600 outline-none text-right shadow-inner">
                                </div>
                            </td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            
            <!-- Botones de Acción -->
            <div class="mt-8 flex flex-col sm:flex-row justify-end gap-4 border-t border-slate-100 pt-8">
                <button id="btn-recalcular" class="flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 px-6 py-3 rounded-xl font-bold transition-colors">
                    <i class="fa-solid fa-rotate-right"></i> Recalcular Odontograma
                </button>
                <button id="btn-imprimir" class="flex items-center justify-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5">
                    <i class="fa-solid fa-print text-amber-400"></i> Imprimir / PDF
                </button>
            </div>
            
        </div>
    </main>

    <script src="../version.js"></script>
    <script src="./script.js"></script>
</body>
</html>
